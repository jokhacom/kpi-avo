// ---------------- calculation core ----------------
function computeIndicatorPercent(indicator, actualRaw, formulaType) {
  const min = Number(indicator.min);
  const norm = Number(indicator.norm);
  const actual = Number(actualRaw) || 0;
  const lowerIsBetter = norm < min;
  if (formulaType === "threshold") {
    const reachedNorm = lowerIsBetter ? actual <= norm : actual >= norm;
    const reachedMin = lowerIsBetter ? actual <= min : actual >= min;
    if (reachedNorm) return 100;
    if (reachedMin) return 50;
    return 0;
  }
  if (min === norm) {
    const reached = lowerIsBetter ? actual <= norm : actual >= norm;
    return reached ? 100 : 0;
  }
  if (lowerIsBetter) {
    if (actual >= min) return 0;
    return ((min - actual) / (min - norm)) * 100;
  }
  if (actual <= min) return 0;
  return ((actual - min) / (norm - min)) * 100;
}

function computeOverall(indicators, facts, formulaType) {
  let weightedSum = 0, weightSum = 0;
  const perIndicator = indicators.map((ind) => {
    const actual = Number(facts[ind.id] ?? 0);
    const percent = computeIndicatorPercent(ind, actual, formulaType);
    const weight = Number(ind.weight) || 0;
    weightedSum += percent * weight;
    weightSum += weight;
    return { id: ind.id, name: ind.name, min: ind.min, norm: ind.norm, weight: ind.weight, actual, percent };
  });
  const overall = weightSum > 0 ? weightedSum / weightSum : 0;
  return { perIndicator, overall };
}

// Премия: сначала % выполнения KPI, затем коэффициент по отработанным часам,
// и итог никогда не может превысить 100% (= base_amount).
function computePremium(overallPercent, hoursWorked, normHours, baseAmount) {
  const hours = Number(hoursWorked) || 0;
  const norm = Number(normHours) || 0;
  const hoursCoef = norm > 0 ? Math.min(1, hours / norm) : 1;
  const raw = (Math.max(0, overallPercent) / 100) * Number(baseAmount || 0) * hoursCoef;
  return Math.max(0, Math.min(raw, Number(baseAmount || 0)));
}
const TAX_RATE = 0.075;
const afterTax = (amount) => Number(amount || 0) * (1 - TAX_RATE);

function gradeFor(percent, grades) {
  const sorted = [...grades].sort((a, b) => b.min - a.min);
  for (const g of sorted) if (percent >= Number(g.min)) return g.letter;
  return sorted.length ? sorted[sorted.length - 1].letter : "F";
}
function gradeColor(letter) {
  switch (letter) {
    case "A": return GREEN;
    case "B": return BLUE;
    case "C": return AMBER;
    case "D": return ORANGE;
    default: return RED;
  }
}
function percentColor(pct) {
  if (pct <= 0) return RED;
  if (pct < 100) return AMBER;
  return GREEN;
}
const formatSum = (n) => Math.round(Number(n) || 0).toLocaleString("ru-RU").replace(/,/g, " ");

// ---------------- import helpers ----------------
function normalizeHeader(s) {
  return String(s || "").toLowerCase().trim().replace(/[^a-zа-яё0-9]+/gi, "");
}
function parseFactValue(raw) {
  if (raw === null || raw === undefined || raw === "") return null;
  if (typeof raw === "number") return raw;
  const s = String(raw).replace(",", ".");
  const m = s.match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
async function parseWorkbook(file) {
  const isCsv = /\.csv$/i.test(file.name);
  let wb;
  if (isCsv) { wb = XLSX.read(await file.text(), { type: "string" }); }
  else { wb = XLSX.read(await file.arrayBuffer(), { type: "array" }); }
  const sheet = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
}
const HOURS_ALIASES = ["часы", "отработанныечасы", "отработаночасов", "часовотработано", "hours", "hoursworked"];
function findHoursColumn(headerRow) {
  for (let c = 1; c < headerRow.length; c++) if (HOURS_ALIASES.includes(normalizeHeader(headerRow[c]))) return c;
  return -1;
}
function matchColumnsToIndicators(headerRow, indicators, excludeIdx) {
  const columns = []; const unmatched = [];
  for (let c = 1; c < headerRow.length; c++) {
    if (c === excludeIdx) continue;
    const norm = normalizeHeader(headerRow[c]);
    if (!norm) continue;
    let match = indicators.find((ind) => normalizeHeader(ind.name) === norm);
    if (!match) match = indicators.find((ind) => normalizeHeader(ind.name).includes(norm) || norm.includes(normalizeHeader(ind.name)));
    if (match) columns.push({ colIdx: c, indicatorId: match.id, indicatorName: match.name });
    else unmatched.push(headerRow[c]);
  }
  const matchedIds = new Set(columns.map((c) => c.indicatorId));
  const missingIndicators = indicators.filter((ind) => !matchedIds.has(ind.id)).map((ind) => ind.name);
  return { columns, unmatched, missingIndicators };
}
function buildRowsFromAoa(aoa, indicators) {
  if (!aoa || aoa.length === 0) return { rows: [], unmatchedColumns: [], missingIndicators: [], warnings: [], hoursColumnFound: false };
  const [headerRow, ...dataRows] = aoa;
  const hoursColIdx = findHoursColumn(headerRow);
  const { columns, unmatched, missingIndicators } = matchColumnsToIndicators(headerRow, indicators, hoursColIdx);
  const warnings = [];
  const rows = [];
  dataRows.forEach((row, i) => {
    const name = String(row[0] || "").trim();
    if (!name) return;
    const facts = {};
    columns.forEach(({ colIdx, indicatorId, indicatorName }) => {
      const val = parseFactValue(row[colIdx]);
      if (val === null) { warnings.push(`Строка ${i + 2}, «${name}»: не удалось прочитать «${indicatorName}» — поставлено 0`); facts[indicatorId] = 0; }
      else facts[indicatorId] = val;
    });
    let hoursWorked = null;
    if (hoursColIdx !== -1) { const hv = parseFactValue(row[hoursColIdx]); hoursWorked = hv === null ? null : hv; }
    rows.push({ name, facts, hoursWorked });
  });
  return { rows, unmatchedColumns: unmatched, missingIndicators, warnings, hoursColumnFound: hoursColIdx !== -1 };
}

// ---------------- small UI atoms ----------------
function Card({ children, style = {} }) {
  return <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 12, ...style }}>{children}</div>;
}
function Btn({ children, onClick, variant = "secondary", disabled, style = {}, title }) {
  const base = { display: "inline-flex", alignItems: "center", gap: 6, fontSize: 14, padding: "8px 12px", borderRadius: 8, cursor: disabled ? "default" : "pointer", opacity: disabled ? 0.55 : 1 };
  const variants = {
    primary: { background: BLUE, color: "#fff", border: "none" },
    secondary: { background: CARD_BG, color: TEXT, border: `1px solid ${BORDER}` },
    ghost: { background: "transparent", color: MUTED, border: "none" },
  };
  return <button onClick={onClick} disabled={disabled} title={title} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}
function TextField({ value, onChange, placeholder, style = {}, type = "text" }) {
  return <input type={type} value={value} onChange={(e) => onChange(e.target.value)} placeholder={placeholder}
    style={{ fontSize: 14, padding: "7px 10px", borderRadius: 8, border: `1px solid ${BORDER}`, background: CARD_BG, color: TEXT, outline: "none", ...style }} />;
}
function NumberField({ value, onChange, width = "72px", suffix }) {
  const [local, setLocal] = useState(String(value));
  useEffect(() => setLocal(String(value)), [value]);
  return (
    <span style={{ display: "inline-flex", alignItems: "baseline", gap: 4 }}>
      <input type="number" value={local}
        onChange={(e) => { const raw = e.target.value; setLocal(raw); const n = parseFloat(raw); if (Number.isFinite(n)) onChange(n); }}
        onBlur={() => { const n = parseFloat(local); onChange(Number.isFinite(n) ? n : 0); if (!Number.isFinite(n)) setLocal("0"); }}
        style={{ width, fontFamily: NUM_FONT, color: TEXT, border: `1px solid ${BORDER}`, textAlign: "right", fontSize: 14, padding: "6px 8px", borderRadius: 8, outline: "none" }} />
      {suffix && <span style={{ fontSize: 12, color: MUTED }}>{suffix}</span>}
    </span>
  );
}

// ---------------- Auth screen ----------------
function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError(""); setInfo(""); setBusy(true);
    try {
      if (mode === "login") {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setInfo("Готово. Если в проекте включено подтверждение почты — проверьте письмо, затем войдите.");
      }
    } catch (e) {
      setError(e.message || "Ошибка входа");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: BG }}>
      <Card style={{ padding: 28, width: 340 }}>
        <div style={{ fontSize: 12, letterSpacing: 1, textTransform: "uppercase", color: MUTED, marginBottom: 4 }}>KPI сотрудников</div>
        <h1 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 20px", color: TEXT }}>{mode === "login" ? "Вход" : "Регистрация"}</h1>
        <div style={{ display: "grid", gap: 10, marginBottom: 14 }}>
          <TextField type="email" value={email} onChange={setEmail} placeholder="Email" />
          <TextField type="password" value={password} onChange={setPassword} placeholder="Пароль" />
        </div>
        {error && <div style={{ fontSize: 13, color: RED, marginBottom: 10 }}>{error}</div>}
        {info && <div style={{ fontSize: 13, color: GREEN, marginBottom: 10 }}>{info}</div>}
        <Btn variant="primary" disabled={busy || !email || !password} onClick={submit} style={{ width: "100%", justifyContent: "center", padding: "10px 0", marginBottom: 10 }}>
          {mode === "login" ? "Войти" : "Зарегистрироваться"}
        </Btn>
        <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); setInfo(""); }}
          style={{ background: "none", border: "none", color: MUTED, fontSize: 13, cursor: "pointer", width: "100%", textAlign: "center" }}>
          {mode === "login" ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти"}
        </button>
      </Card>
    </div>
  );
}

// ---------------- Import page ----------------
function ImportPage({ settings, month, onMonthChange, onCommit, lastSummary }) {
  const [fileName, setFileName] = useState("");
  const [parsed, setParsed] = useState(null);
  const [error, setError] = useState("");
  const [summaryMonth, setSummaryMonth] = useState(month);
  const fileInputRef = useRef(null);

  const handleFile = async (file) => {
    setError(""); setParsed(null); setFileName(file.name);
    try {
      const aoa = await parseWorkbook(file);
      const result = buildRowsFromAoa(aoa, settings.indicators);
      if (result.rows.length === 0) { setError("Не нашёл ни одной строки с именем сотрудника в первой колонке."); return; }
      setParsed(result);
    } catch (e) {
      setError("Не удалось прочитать файл. Убедитесь, что это .xlsx, .xls или .csv.");
    }
  };

  const canCommit = parsed && parsed.missingIndicators.length === 0;
  const commit = () => {
    if (!canCommit) return;
    onCommit(parsed.rows, month);
    setSummaryMonth(month);
    setParsed(null);
    setFileName("");
  };

  const exportResults = () => {
    if (!lastSummary || lastSummary.length === 0) return;
    const header = ["Сотрудник", ...settings.indicators.map((i) => `${i.name}, %`), "Часы", "Итоговый KPI, %", "Оценка", "Премия, сум", "Премия после налога (7,5%), сум"];
    const body = lastSummary.map((s) => {
      const map = {}; s.result.perIndicator.forEach((p) => map[p.id] = p.percent);
      return [s.name, ...settings.indicators.map((i) => Math.round((map[i.id] ?? 0) * 10) / 10), s.hoursWorked, Math.round(s.result.overall * 10) / 10, s.result.grade, Math.round(s.result.premium), Math.round(afterTax(s.result.premium))];
    });
    const ws = XLSX.utils.aoa_to_sheet([[`Период: ${monthLabel(summaryMonth)}`], [], header, ...body]);
    ws["!cols"] = header.map(() => ({ wch: 18 }));
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Результат импорта");
    XLSX.writeFile(wb, `KPI_импорт_${summaryMonth}.xlsx`);
  };

  return (
    <div style={{ display: "grid", gap: 20 }}>
      <h2 style={{ fontSize: 20, fontWeight: 600, color: TEXT, margin: 0 }}>Импорт из Excel</h2>
      <Card style={{ padding: 16 }}>
        <p style={{ fontSize: 14, color: MUTED, marginTop: 0 }}>
          Первая колонка — ФИО сотрудника. Дальше — колонки показателей (названия должны совпадать с «Настройками KPI»)
          и, по желанию, колонка «Часы» с отработанными часами за месяц — если её нет, считается полная норма.
          Минимум, норматив, вес, сумма премии и норма часов всегда берутся из настроек, а не из файла.
        </p>
        <div style={{ display: "flex", alignItems: "center", gap: 12, flexWrap: "wrap" }}>
          <button type="button" onClick={() => fileInputRef.current && fileInputRef.current.click()}
            style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14, padding: "9px 14px", borderRadius: 8, background: BLUE, color: "#fff", border: "none", cursor: "pointer", fontWeight: 500 }}>
            <UploadIcon size={16} /> Загрузить файл
          </button>
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls,.csv"
            style={{ position: "absolute", width: 1, height: 1, opacity: 0, pointerEvents: "none" }}
            onChange={(e) => { const f = e.target.files && e.target.files[0]; if (f) handleFile(f); e.target.value = ""; }} />
          {fileName && <span style={{ fontSize: 14, color: MUTED, display: "flex", alignItems: "center", gap: 6 }}><FileIcon size={14} /> {fileName}</span>}
          <label style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 14 }}>
            <span style={{ color: MUTED }}>Месяц</span>
            <input type="month" value={month} onChange={(e) => onMonthChange(e.target.value)}
              style={{ fontSize: 14, padding: "7px 10px", borderRadius: 8, border: `1px solid ${BORDER}`, color: TEXT }} />
          </label>
        </div>
        {error && <div style={{ fontSize: 14, color: RED, marginTop: 10 }}>{error}</div>}
      </Card>

      {parsed && (
        <Card style={{ padding: 16 }}>
          {parsed.missingIndicators.length > 0 && (
            <div style={{ fontSize: 14, color: RED, background: "#FBEAE8", border: `1px solid ${RED}`, borderRadius: 8, padding: "8px 12px", marginBottom: 12 }}>
              Ошибка: в файле не найдены столбцы для показателей — {parsed.missingIndicators.join(", ")}. Импорт заблокирован, пока не найдены все показатели.
            </div>
          )}
          {!parsed.hoursColumnFound && (
            <div style={{ fontSize: 13, color: AMBER, marginBottom: 12 }}>
              Колонка «Часы» не найдена — для всех строк будет использована полная норма ({settings.norm_hours} ч).
            </div>
          )}
          <div style={{ fontWeight: 500, color: TEXT, marginBottom: 12 }}>Найдено сотрудников: {parsed.rows.length} · период: {monthLabel(month)}</div>
          {parsed.unmatchedColumns.length > 0 && (
            <div style={{ fontSize: 14, color: AMBER, marginBottom: 12 }}>
              Лишние колонки: {parsed.unmatchedColumns.join(", ")}. Игнорируются.
            </div>
          )}
          <div style={{ display: "grid", gap: 6, marginBottom: 12 }}>
            {parsed.rows.map((r, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", fontSize: 14 }}>
                <span style={{ color: TEXT }}>{r.name}</span>
                <span style={{ color: MUTED, fontFamily: NUM_FONT }}>
                  {settings.indicators.map((ind) => `${ind.name}: ${r.facts[ind.id] ?? "—"}`).join(" · ")} · часы: {r.hoursWorked ?? settings.norm_hours}
                </span>
              </div>
            ))}
          </div>
          {parsed.warnings.length > 0 && <div style={{ fontSize: 12, color: AMBER, marginBottom: 12 }}>{parsed.warnings.map((w, i) => <div key={i}>{w}</div>)}</div>}
          <Btn variant="primary" disabled={!canCommit} onClick={commit}><CalcIcon size={15} /> Рассчитать KPI</Btn>
        </Card>
      )}

      {lastSummary && lastSummary.length > 0 && (
        <Card style={{ padding: 16 }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
            <div style={{ fontWeight: 500, color: TEXT }}>Результат · {monthLabel(summaryMonth)}</div>
            <Btn variant="primary" onClick={exportResults}><DownloadIcon size={15} /> Скачать результат в Excel</Btn>
          </div>
          <div style={{ display: "grid", gap: 8 }}>
            {lastSummary.map((s, i) => (
              <div key={i} style={{ display: "flex", justifyContent: "space-between", alignItems: "center", fontSize: 14 }}>
                <span style={{ color: TEXT }}>{s.name}</span>
                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                  <span style={{ fontFamily: NUM_FONT, color: TEXT }}>{s.result.overall.toFixed(1)}%</span>
                  <GradeBadge letter={s.result.grade} size={28} />
                  <span style={{ fontFamily: NUM_FONT, color: TEXT }}>{formatSum(s.result.premium)} сум</span>
                  <span style={{ fontFamily: NUM_FONT, color: MUTED, fontSize: 12 }}>({formatSum(afterTax(s.result.premium))} после налога)</span>
                </div>
              </div>
            ))}
          </div>
        </Card>
      )}
    </div>
  );
}

// ---------------- App ----------------
function KpiApp() {
  const [session, setSession] = useState(undefined); // undefined = loading, null = logged out
  const [profile, setProfile] = useState(null);
  const [users, setUsers] = useState([]);
  const [view, setView] = useState("employees");
  const [returnView, setReturnView] = useState("employees");
  const [employees, setEmployees] = useState([]);
  const [settings, setSettings] = useState(defaultSettings());
  const [records, setRecords] = useState({});
  const [cardParams, setCardParams] = useState(null);
  const [importMonth, setImportMonth] = useState(currentMonth());
  const [importSummary, setImportSummary] = useState(null);
  const [draftFacts, setDraftFacts] = useState({});
  const [draftHours, setDraftHours] = useState(168);
  const [draftResult, setDraftResult] = useState(null);
  const [loadError, setLoadError] = useState("");

  // ---- auth bootstrap ----
  useEffect(() => {
    if (!supabaseReady) return;
    sb.auth.getSession().then(({ data }) => setSession(data.session ?? null));
    const { data: sub } = sb.auth.onAuthStateChange((_event, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  // ---- load profile + shared data once logged in ----
  const loadAll = useCallback(async () => {
    if (!session) return;
    setLoadError("");
    try {
      const { data: prof, error: profErr } = await sb.from("profiles").select("*").eq("id", session.user.id).single();
      if (profErr) throw profErr;
      setProfile(prof);

      const { data: sett } = await sb.from("kpi_settings").select("*").eq("id", 1).single();
      if (sett) setSettings(sett);

      const { data: emps } = await sb.from("employees").select("*").order("name");
      setEmployees(emps || []);

      const { data: recs } = await sb.from("kpi_records").select("*");
      const map = {};
      (recs || []).forEach((r) => { map[`${r.employee_id}|${r.month}`] = r; });
      setRecords(map);

      if (isSuperAdmin(prof)) {
        const { data: allUsers } = await sb.from("profiles").select("*").order("email");
        setUsers(allUsers || []);
      }
    } catch (e) {
      setLoadError(e.message || "Не удалось загрузить данные");
    }
  }, [session]);

  useEffect(() => { loadAll(); }, [loadAll]);

  const addEmployee = async (name) => {
    const { data, error } = await sb.from("employees").insert({ name }).select().single();
    if (!error && data) setEmployees((prev) => [...prev, data].sort((a, b) => a.name.localeCompare(b.name)));
  };
  const removeEmployee = async (id) => {
    const { error } = await sb.from("employees").delete().eq("id", id);
    if (!error) setEmployees((prev) => prev.filter((e) => e.id !== id));
  };
  const changeSettings = async (next) => {
    setSettings(next); // optimistic
    const { error } = await sb.from("kpi_settings").update({ ...next, updated_at: new Date().toISOString() }).eq("id", 1);
    if (error) { setLoadError("Не удалось сохранить настройки: " + error.message); loadAll(); }
  };
  const updateUser = async (userId, patch) => {
    setUsers((prev) => prev.map((u) => u.id === userId ? { ...u, ...patch } : u)); // optimistic
    const { error } = await sb.from("profiles").update(patch).eq("id", userId);
    if (error) { setLoadError("Не удалось изменить пользователя: " + error.message); loadAll(); }
  };

  const openCard = (employeeId, month, from = "employees") => {
    setReturnView(from);
    setCardParams({ employeeId, month });
    setView("card");
  };

  const recordKey = cardParams ? `${cardParams.employeeId}|${cardParams.month}` : null;
  const existingRecord = recordKey ? records[recordKey] : null;
  const snapshotIndicators = existingRecord?.indicators_snapshot || settings.indicators;
  const snapshotFormula = existingRecord?.formula_type || settings.formula_type;
  const snapshotBase = existingRecord?.base_amount ?? settings.base_amount;
  const snapshotNormHours = existingRecord?.norm_hours ?? settings.norm_hours;

  useEffect(() => {
    if (!cardParams) return;
    setDraftFacts(existingRecord?.facts || {});
    setDraftHours(existingRecord?.hours_worked ?? snapshotNormHours);
    setDraftResult(existingRecord?.result || null);
    // eslint-disable-next-line
  }, [recordKey]);

  const handleFactChange = (indId, value) => setDraftFacts((prev) => ({ ...prev, [indId]: value }));

  const handleCalculate = async () => {
    const { perIndicator, overall } = computeOverall(snapshotIndicators, draftFacts, snapshotFormula);
    const grade = gradeFor(overall, settings.grades);
    const premium = computePremium(overall, draftHours, snapshotNormHours, snapshotBase);
    const result = { perIndicator, overall, grade, premium };
    setDraftResult(result);
    const payload = {
      employee_id: cardParams.employeeId,
      month: cardParams.month,
      facts: draftFacts,
      hours_worked: draftHours,
      indicators_snapshot: snapshotIndicators,
      formula_type: snapshotFormula,
      base_amount: snapshotBase,
      norm_hours: snapshotNormHours,
      result,
      created_by: session.user.id,
      saved_at: new Date().toISOString(),
    };
    const { data, error } = await sb.from("kpi_records").upsert(payload, { onConflict: "employee_id,month,created_by" }).select().single();
    if (!error && data) setRecords((prev) => ({ ...prev, [recordKey]: data }));
  };

  const handleMonthChange = (m) => setCardParams((p) => ({ ...p, month: m }));

  const exportCard = () => {
    if (!draftResult || !cardParams) return;
    const emp = employees.find((e) => e.id === cardParams.employeeId);
    const meta = [["Сотрудник", emp?.name || "—"], ["Период", monthLabel(cardParams.month)], ["Часы", `${draftHours} / ${snapshotNormHours}`], ["Сумма 100% премии, сум", snapshotBase], []];
    const header = ["Показатель", "Минимум", "Норматив", "Факт", "Выполнение, %"];
    const body = draftResult.perIndicator.map((p) => [p.name, p.min, p.norm, p.actual, Math.round(p.percent * 10) / 10]);
    const footer = [[], ["Итоговый KPI", "", "", "", Math.round(draftResult.overall * 10) / 10], ["Оценка", "", "", "", draftResult.grade], ["Премия, сум", "", "", "", Math.round(draftResult.premium)], ["Премия после налога (7,5%), сум", "", "", "", Math.round(afterTax(draftResult.premium))]];
    const ws = XLSX.utils.aoa_to_sheet([...meta, header, ...body, ...footer]);
    ws["!cols"] = [{ wch: 26 }, { wch: 10 }, { wch: 10 }, { wch: 10 }, { wch: 14 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "KPI");
    XLSX.writeFile(wb, `KPI_${(emp?.name || "sotrudnik").replace(/\s+/g, "_")}_${cardParams.month}.xlsx`);
  };

  const exportAllHistory = () => {
    const header = ["Сотрудник", "Период", "Итоговый KPI, %", "Оценка", "Премия, сум", "Премия после налога (7,5%), сум"];
    const body = Object.values(records).filter((r) => r.result).map((r) => {
      const name = employees.find((e) => e.id === r.employee_id)?.name || "—";
      return [name, monthLabel(r.month), Math.round(r.result.overall * 10) / 10, r.result.grade, Math.round(r.result.premium), Math.round(afterTax(r.result.premium))];
    });
    const ws = XLSX.utils.aoa_to_sheet([header, ...body]);
    ws["!cols"] = [{ wch: 24 }, { wch: 16 }, { wch: 14 }, { wch: 10 }, { wch: 14 }];
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "История KPI");
    XLSX.writeFile(wb, "KPI_история.xlsx");
  };

  const handleImportCommit = async (rows, month) => {
    for (const row of rows) {
      let emp = employees.find((e) => e.name.trim().toLowerCase() === row.name.trim().toLowerCase());
      if (!emp) {
        const { data } = await sb.from("employees").insert({ name: row.name.trim() }).select().single();
        if (data) { emp = data; setEmployees((prev) => [...prev, data]); }
      }
      if (!emp) continue;
      const { perIndicator, overall } = computeOverall(settings.indicators, row.facts, settings.formula_type);
      const grade = gradeFor(overall, settings.grades);
      const hoursWorked = row.hoursWorked ?? settings.norm_hours;
      const premium = computePremium(overall, hoursWorked, settings.norm_hours, settings.base_amount);
      const result = { perIndicator, overall, grade, premium };
      const payload = {
        employee_id: emp.id, month, facts: row.facts, hours_worked: hoursWorked,
        indicators_snapshot: settings.indicators, formula_type: settings.formula_type,
        base_amount: settings.base_amount, norm_hours: settings.norm_hours,
        result, created_by: session.user.id, saved_at: new Date().toISOString(),
      };
      const { data } = await sb.from("kpi_records").upsert(payload, { onConflict: "employee_id,month,created_by" }).select().single();
      if (data) setRecords((prev) => ({ ...prev, [`${emp.id}|${month}`]: data }));
    }
    const summary = [];
    for (const row of rows) {
      const emp = employees.find((e) => e.name.trim().toLowerCase() === row.name.trim().toLowerCase());
      const rec = emp ? records[`${emp.id}|${month}`] : null;
      const { perIndicator, overall } = computeOverall(settings.indicators, row.facts, settings.formula_type);
      const grade = gradeFor(overall, settings.grades);
      const hoursWorked = row.hoursWorked ?? settings.norm_hours;
      const premium = computePremium(overall, hoursWorked, settings.norm_hours, settings.base_amount);
      summary.push({ name: row.name, hoursWorked, result: { perIndicator, overall, grade, premium } });
    }
    setImportSummary(summary);
  };

  if (!supabaseReady) {
    return (
      <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: BG, padding: 20 }}>
        <Card style={{ padding: 24, maxWidth: 480 }}>
          <div style={{ fontWeight: 600, marginBottom: 8, color: TEXT }}>Нужно подключить базу данных</div>
          <div style={{ fontSize: 14, color: MUTED }}>
            Откройте этот файл в текстовом редакторе и впишите SUPABASE_URL и SUPABASE_ANON_KEY
            (вверху script-блока) — их можно найти в вашем проекте Supabase → Settings → API.
          </div>
        </Card>
      </div>
    );
  }

  if (session === undefined) return null;
  if (session === null) return <AuthScreen />;
  if (!profile) return null;

  return (
    <div style={{ minHeight: "100vh", width: "100%", background: BG, color: TEXT }}>
      <div style={{ maxWidth: 760, margin: "0 auto", padding: "32px 20px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 24, flexWrap: "wrap", gap: 12 }}>
          <div>
            <div style={{ fontSize: 12, letterSpacing: 1, textTransform: "uppercase", color: MUTED, marginBottom: 4 }}>KPI сотрудников</div>
            <h1 style={{ fontSize: 24, fontWeight: 600, color: TEXT, margin: 0 }}>Расчёт премии по показателям</h1>
          </div>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ textAlign: "right" }}>
              <div style={{ fontSize: 13, color: TEXT }}>{profile.email}</div>
              <RoleBadge role={profile.role} />
            </div>
            <button onClick={() => sb.auth.signOut()} title="Выйти" style={{ background: "none", border: `1px solid ${BORDER}`, borderRadius: 8, padding: 8, cursor: "pointer", color: MUTED }}>
              <LogOutIcon size={16} />
            </button>
          </div>
        </div>

        {loadError && <div style={{ fontSize: 13, color: RED, marginBottom: 16 }}>{loadError}</div>}

        <React.Fragment>
          {view !== "card" && <TopNav view={view} setView={setView} profile={profile} />}

          {view === "employees" && (
            <EmployeesPage employees={employees} onAdd={addEmployee} onRemove={removeEmployee}
              onOpenCard={(id, m) => openCard(id, m, "employees")} canManage={canManageEmployees(profile)} />
          )}
          {view === "import" && profile.role !== "user" && (
            <ImportPage settings={settings} month={importMonth} onMonthChange={setImportMonth} onCommit={handleImportCommit} lastSummary={importSummary} />
          )}
          {view === "settings" && canEditSettings(profile) && <SettingsPage settings={settings} onChange={changeSettings} />}
          {view === "history" && (
            <HistoryPage employees={employees} records={records} onOpen={(id, m) => openCard(id, m, "history")} onExportAll={exportAllHistory} />
          )}
          {view === "users" && isSuperAdmin(profile) && <UsersPage users={users} onUpdateUser={updateUser} myId={profile.id} />}

          {view === "card" && cardParams && (
            <EmployeeCardPage
              employee={employees.find((e) => e.id === cardParams.employeeId)}
              month={cardParams.month}
              onMonthChange={handleMonthChange}
              snapshotIndicators={snapshotIndicators}
              normHours={snapshotNormHours}
              baseAmount={snapshotBase}
              facts={draftFacts}
              hoursWorked={draftHours}
              result={draftResult}
              onFactChange={handleFactChange}
              onHoursChange={setDraftHours}
              onCalculate={handleCalculate}
              onBack={() => setView(returnView)}
              onExport={exportCard}
            />
          )}
        </React.Fragment>
      </div>
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<KpiApp />);
</script>
</body>
</html>
