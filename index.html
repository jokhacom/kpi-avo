// ---------------- calculation core ----------------
function computeIndicatorPercent(indicator, actualRaw, formulaType) {
  const min = Number(indicator.min);
  const norm = Number(indicator.norm);
  const actual = Number(actualRaw) || 0;
  const lowerIsBetter = norm < min;
  if (formulaType === "threshold") {
    const reachedNorm = lowerIsBetter ? actual <= norm : actual >= norm;
    const reachedMin = lowerIsBetter ? actual <= min : actual >= min;
    if (reachedNorm) return 100;
    if (reachedMin) return 50;
    return 0;
  }
  if (min === norm) {
    const reached = lowerIsBetter ? actual <= norm : actual >= norm;
    return reached ? 100 : 0;
  }
  if (lowerIsBetter) {
    if (actual >= min) return 0;
    return ((min - actual) / (min - norm)) * 100;
  }
  if (actual <= min) return 0;
  return ((actual - min) / (norm - min)) * 100;
}

function computeOverall(indicators, facts, formulaType) {
  let weightedSum = 0, weightSum = 0;
  const perIndicator = indicators.map((ind) => {
    const actual = Number(facts[ind.id] ?? 0);
    const percent = computeIndicatorPercent(ind, actual, formulaType);
    const weight = Number(ind.weight) || 0;
    weightedSum += percent * weight;
    weightSum += weight;
    return { id: ind.id, name: ind.name, min: ind.min, norm: ind.norm, weight: ind.weight, actual, percent };
  });
  const overall = weightSum > 0 ? weightedSum / weightSum : 0;
  return { perIndicator, overall };
}

// Премия: сначала % выполнения KPI, затем коэффициент по отработанным часам,
// и итог никогда не может превысить 100% (= base_amount).
function computePremium(overallPercent, hoursWorked, normHours, baseAmount) {
  const hours = Number(hoursWorked) || 0;
  const norm = Number(normHours) || 0;
  const hoursCoef = norm > 0 ? Math.min(1, hours / norm) : 1;
  const raw = (Math.max(0, overallPercent) / 100) * Number(baseAmount || 0) * hoursCoef;
  return Math.max(0, Math.min(raw, Number(baseAmount || 0)));
}
const TAX_RATE = 0.075;
const afterTax = (amount) => Number(amount || 0) * (1 - TAX_RATE);

function gradeFor(percent, grades) {
  const sorted = [...grades].sort((a, b) => b.min - a.min);
  for (const g of sorted) if (percent >= Number(g.min)) return g.letter;
  return sorted.length ? sorted[sorted.length - 1].letter : "F";
}
function gradeColor(letter) {
  switch (letter) {
    case "A": return GREEN;
    case "B": return BLUE;
    case "C": return AMBER;
    case "D": return ORANGE;
    default: return RED;
  }
}
function percentColor(pct) {
  if (pct <= 0) return RED;
  if (pct < 100) return AMBER;
  return GREEN;
}
const formatSum = (n) => Math.round(Number(n) || 0).toLocaleString("ru-RU").replace(/,/g, " ");

// ---------------- import helpers ----------------
function normalizeHeader(s) {
  return String(s || "").toLowerCase().trim().replace(/[^a-zа-яё0-9]+/gi, "");
}
function parseFactValue(raw) {
  if (raw === null || raw === undefined || raw === "") return null;
  if (typeof raw === "number") return raw;
  const s = String(raw).replace(",", ".");
  const m = s.match(/-?\d+(\.\d+)?/);
  return m ? parseFloat(m[0]) : null;
}
async function parseWorkbook(file) {
  const isCsv = /\.csv$/i.test(file.name);
  let wb;
  if (isCsv) { wb = XLSX.read(await file.text(), { type: "string" }); }
  else { wb = XLSX.read(await file.arrayBuffer(), { type: "array" }); }
  const sheet = wb.Sheets[wb.SheetNames[0]];
  return XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
}
const HOURS_ALIASES = ["часы", "отработанныечасы", "отработаночасов", "часовотработано", "hours", "hoursworked"];
function findHoursColumn(headerRow) {
  for (let c = 1; c < headerRow.length; c++) if (HOURS_ALIASES.includes(normalizeHeader(headerRow[c]))) return c;
  return -1;
}
function matchColumnsToIndicators(headerRow, indicators, excludeIdx) {
  const columns = []; const unmatched = [];
  for (let c = 1; c < headerRow.length; c++) {
    if (c === excludeIdx) continue;
    const norm = normalizeHeader(headerRow[c]);
    if (!norm) continue;
    let match = indicators.find((ind) => normalizeHeader(ind.name) === norm);
    if (!match) match = indicators.find((ind) => normalizeHeader(ind.name).includes(norm) || norm.includes(normalizeHeader(ind.name)));
    if (match) columns.push({ colIdx: c, indicatorId: match.id, indicatorName: match.name });
    else unmatched.push(headerRow[c]);
  }
  const matchedIds = new Set(columns.map((c) => c.indicatorId));
  const missingIndicators = indicators.filter((ind) => !matchedIds.has(ind.id)).map((ind) => ind.name);
  return { columns, unmatched, missingIndicators };
}
function buildRowsFromAoa(aoa, indicators) {
  if (!aoa || aoa.length === 0) return { rows: [], unmatchedColumns: [], missingIndicators: [], warnings: [], hoursColumnFound: false };
  const [headerRow, ...dataRows] = aoa;
  const hoursColIdx = findHoursColumn(headerRow);
  const { columns, unmatched, missingIndicators } = matchColumnsToIndicators(headerRow, indicators, hoursColIdx);
  const warnings = [];
  const rows = [];
  dataRows.forEach((row, i) => {
    const name = String(row[0] || "").trim();
    if (!name) return;
    const facts = {};
    columns.forEach(({ colIdx, indicatorId, indicatorName }) => {
      const val = parseFactValue(row[colIdx]);
      if (val === null) { warnings.push(`Строка ${i + 2}, «${name}»: не удалось прочитать «${indicatorName}» — поставлено 0`); facts[indicatorId] = 0; }
      else facts[indicatorId] = val;
    });
    let hoursWorked = null;
    if (hoursColIdx !== -1) { const hv = parseFactValue(row[hoursColIdx]); hoursWorked = hv === null ? null : hv; }
    rows.push({ name, facts, hoursWorked });
  });
  return { rows, unmatchedColumns: unmatched, missingIndicators, warnings, hoursColumnFound: hoursColIdx !== -1 };
}

// ---------------- small UI atoms ----------------
function Card({ children, style = {} }) {
  return <div style={{ background: CARD_BG, border: `1px solid ${BORDER}`, borderRadius: 12, ...style }}>{children}</div>;
}
function Btn({ children, onClick, variant = "secondary", disabled, style = {}, title }) {
  const base = { display: "inline-flex", alignItems: "center", gap: 6, fontSize: 14, padding: "8px 12px", borderRadius: 8, cursor: disabled ? "default" : "pointer", opacity: disabled ? 0.55 : 1 };
  const variants = {
    primary: { background: BLUE, color: "#fff", border: "none" },
    secondary: { background: CARD_BG, color: TEXT, border: `1px solid ${BORDER}` },
    ghost: { background: "transparent", color: MUTED, border: "none" },
  };
  return <button onClick={onClick} disabled={disabled} title={title} style={{ ...base, ...variants[variant], ...style }}>{children}</button>;
}
function TextField({ value, onChange, placeholder, style = {}, type = "text" }) {

}
function NumberField({ value, onChange, width = "72px", suffix }) {
  const [local, setLocal] = useState(String(value));
  useEffect(() => setLocal(String(value)), [value]);
  return (
    <span style={{ display: "inline-flex", alignItems: "baseline", gap: 4 }}>

        onChange={(e) => { const raw = e.target.value; setLocal(raw); const n = parseFloat(raw); if (Number.isFinite(n)) onChange(n); }}

// ---------------- Auth screen ----------------
function AuthScreen({ onAuthed }) {
  const [mode, setMode] = useState("login");
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState("");
  const [info, setInfo] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setError(""); setInfo(""); setBusy(true);
    try {
      if (mode === "login") {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      } else {
        const { error } = await sb.auth.signUp({ email, password });
        if (error) throw error;
        setInfo("Готово. Если в проекте включено подтверждение почты — проверьте письмо, затем войдите.");
      }
    } catch (e) {
      setError(e.message || "Ошибка входа");
    } finally {
      setBusy(false);
    }
  };

  return (
    <div style={{ minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", background: BG }}>
      <Card style={{ padding: 28, width: 340 }}>
        <div style={{ fontSize: 12, letterSpacing: 1, textTransform: "uppercase", color: MUTED, marginBottom: 4 }}>KPI сотрудников</div>
        <h1 style={{ fontSize: 20, fontWeight: 600, margin: "0 0 20px", color: TEXT }}>{mode === "login" ? "Вход" : "Регистрация"}</h1>
        <div style={{ display: "grid", gap: 10, marginBottom: 14 }}>
          <TextField type="email" value={email} onChange={setEmail} placeholder="Email" />
          <TextField type="password" value={password} onChange={setPassword} placeholder="Пароль" />
        </div>
        {error && <div style={{ fontSize: 13, color: RED, marginBottom: 10 }}>{error}</div>}
        {info && <div style={{ fontSize: 13, color: GREEN, marginBottom: 10 }}>{info}</div>}
        <Btn variant="primary" disabled={busy || !email || !password} onClick={submit} style={{ width: "100%", justifyContent: "center", padding: "10px 0", marginBottom: 10 }}>
          {mode === "login" ? "Войти" : "Зарегистрироваться"}
        </Btn>
        <button onClick={() => { setMode(mode === "login" ? "signup" : "login"); setError(""); setInfo(""); }}
          style={{ background: "none", border: "none", color: MUTED, fontSize: 13, cursor: "pointer", width: "100%", textAlign: "center" }}>
          {mode === "login" ? "Нет аккаунта? Зарегистрироваться" : "Уже есть аккаунт? Войти"}
        </button>
      </Card>
    </div>
  );
}
